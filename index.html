<style>

* { margin:0; padding:0; box-sizing:border-box; }
body { background:#111; display:flex; align-items:center; justify-content:center; min-height:100vh; font-family:'Lato',sans-serif; }
a { text-decoration:none; }

body { background:#000; }
.story { width:390px; height:692px; border-radius:24px; overflow:hidden; box-shadow:0 12px 50px rgba(0,0,0,0.9); position:relative; display:flex; flex-direction:column; }
.bg { position:absolute; inset:0; }
.bg img { width:100%; height:100%; object-fit:cover; filter:brightness(0.55) saturate(1.35) contrast(1.1); }

.content { position:relative; z-index:2; height:100%; display:flex; flex-direction:column; padding:28px 24px; }
.top { display:flex; align-items:center; gap:10px; }
.logo { width:44px; height:44px; border-radius:50%; object-fit:cover; border:2px solid #ffd265; }
.bname { font-family:'Playfair Display',serif; font-size:16px; color:#fff; font-weight:700; }
.btag { font-size:10px; color:rgba(255,255,255,0.6); letter-spacing:1px; }
.spacer { flex:1; }
.bottom {}
.badge-pill { display:inline-block; background:rgba(255,210,100,0.15); border:1px solid rgba(255,210,100,0.4); border-radius:20px; padding:4px 14px; font-size:10px; color:#ffd265; letter-spacing:3px; text-transform:uppercase; margin-bottom:10px; font-weight:700; }
.headline { font-family:'Playfair Display',serif; font-size:38px; color:#fff; font-weight:700; line-height:1.15; margin-bottom:8px; }
.headline em { color:#ffd265; font-style:italic; }
.tagline { font-size:15px; color:rgba(255,255,255,0.8); line-height:1.55; margin-bottom:20px; font-style:italic; }
.cta { display:block; background:#ffd265; color:#2b0d00; text-align:center; padding:15px; border-radius:50px; font-weight:900; font-size:13px; letter-spacing:2px; text-transform:uppercase; margin-bottom:10px; }
.cta-wpp { display:block; background:rgba(37,211,102,0.2); border:1.5px solid rgba(37,211,102,0.5); color:#60e890; text-align:center; padding:12px; border-radius:50px; font-weight:700; font-size:12px; letter-spacing:1.5px; text-transform:uppercase; }
